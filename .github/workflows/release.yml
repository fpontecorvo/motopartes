name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Convert icon to icns
        run: |
          ICON=desktop/src/main/resources/icon.png
          ICONSET=icon.iconset
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE "$ICON" --out "$ICONSET/icon_${SIZE}x${SIZE}.png" >/dev/null
          done
          for SIZE in 32 64 256 512; do
            HALF=$((SIZE / 2))
            cp "$ICONSET/icon_${SIZE}x${SIZE}.png" "$ICONSET/icon_${HALF}x${HALF}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o desktop/src/main/resources/icon.icns
          rm -rf "$ICONSET"
      - name: Build DMG
        run: ./gradlew :desktop:packageDmg --no-daemon --info
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: desktop/build/compose/binaries/main/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Convert icon to ico
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$PWD\desktop\src\main\resources\icon.png")
          $icon = [System.Drawing.Icon]::FromHandle($png.GetHicon())
          $fs = [System.IO.File]::Create("$PWD\desktop\src\main\resources\icon.ico")
          $icon.Save($fs)
          $fs.Close()
          $png.Dispose()
      - name: Build MSI
        run: ./gradlew.bat :desktop:packageMsi --no-daemon --info
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: desktop/build/compose/binaries/main/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Build DEB
        run: ./gradlew :desktop:packageDeb --no-daemon --info
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: desktop/build/compose/binaries/main/deb/*.deb

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        run: ./gradlew :mobile:assembleRelease --no-daemon
      - name: Rename APK
        run: |
          VERSION=$(grep 'app.version' gradle.properties | cut -d= -f2)
          cp mobile/build/outputs/apk/release/mobile-release-unsigned.apk "motopartes-${VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "*.apk"

  release:
    needs: [build-macos, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-msi/*.msi
            artifacts/linux-deb/*.deb
            artifacts/android-apk/*.apk
          generate_release_notes: true
