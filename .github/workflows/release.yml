name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Build DMG
        run: ./gradlew :desktop:packageDmg --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: desktop/build/compose/binaries/main/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Build MSI
        run: ./gradlew.bat :desktop:packageMsi --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: desktop/build/compose/binaries/main/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Build DEB
        run: ./gradlew :desktop:packageDeb --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: desktop/build/compose/binaries/main/deb/*.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-msi/*.msi
            artifacts/linux-deb/*.deb
          generate_release_notes: true
